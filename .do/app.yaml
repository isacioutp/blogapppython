name: blog-medico-vintage

services:
  - name: web
    github:
      repo: isacioutp/blogapppython
      branch: deploy-do
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: ENABLE_ALERT_SIMULATION
        value: "true"
        scope: RUN_TIME
      - key: ALERT_SIMULATION_TOKEN
        value: ${ALERT_SIMULATION_TOKEN}
        scope: RUN_TIME
        type: SECRET
    log_destinations:
      - name: logtail
        logtail:
          token: ${LOGTAIL_TOKEN}
