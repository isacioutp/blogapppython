name: deploy-logs

on:
  push:
    branches: [logs-testing]

permissions:
  contents: read

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render app spec with GitHub secret
        env:
          LOGTAIL_TOKEN: ${{ secrets.LOGTAIL_TOKEN }}
          ALERT_SIMULATION_TOKEN: ${{ secrets.ALERT_SIMULATION_TOKEN }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: envsubst < .do/app.yaml > .do/app.rendered.yaml

      - name: Deploy the app
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.rendered.yaml
