services:
  blog:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY in environment or .env}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?set ADMIN_PASSWORD in environment or .env}"
      DATABASE_URL: "sqlite:////data/blog.db"
      FLASK_APP: "app.py"
      SESSION_COOKIE_SECURE: "true"
      TRUSTED_HOSTS: "localhost,127.0.0.1"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "900"
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "5"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
      ENABLE_FILE_LOG: "true"
      ENABLE_DEMO_SEED: "false"
    volumes:
      - blogdata:/data
    restart: unless-stopped

volumes:
  blogdata:
